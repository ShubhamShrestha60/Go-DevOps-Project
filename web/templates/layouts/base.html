{{define "base.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPulse | Production-Grade Productivity</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="brand">
                <i class="fas fa-pulse"></i>
                <span>DevPulse</span>
            </div>
            
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="/" class="nav-link" id="nav-dashboard">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/projects" class="nav-link" id="nav-projects">
                        <i class="fas fa-project-diagram"></i>
                        <span>Projects</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/tasks" class="nav-link" id="nav-tasks">
                        <i class="fas fa-tasks"></i>
                        <span>Tasks</span>
                    </a>
                </li>
            </ul>

            <div class="user-section">
                <a href="#" class="nav-link" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Dashboard</h1>
                <div class="user-profile">
                    <span id="user-name">Loading...</span>
                    <!-- Placeholder for image generation if needed later -->
                </div>
            </header>

            <div id="content-area">
                <!-- Page content will be loaded here via templates or AJAX -->
                {{template "content" .}}
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
