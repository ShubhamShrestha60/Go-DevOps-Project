{{define "content"}}
<div style="max-width: 800px; margin: 0 auto">
    <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 40px">
        <div style="width: 80px; height: 80px; border-radius: 20px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; font-weight: bold; box-shadow: 0 0 20px rgba(79, 70, 229, 0.4)">
            P
        </div>
        <div>
            <h2 id="profile-full-name">User Name</h2>
            <p style="color: var(--text-muted)" id="profile-email">user@example.com</p>
        </div>
    </div>

    <div class="glass glass-card" style="padding: 32px">
        <h3 style="margin-bottom: 24px">Account Settings</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="edit-full-name" class="form-control" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="edit-username" class="form-control" readonly style="opacity: 0.6">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="edit-email" class="form-control" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>Role</label>
                <input type="text" id="edit-role" class="form-control" readonly style="opacity: 0.6">
            </div>
        </div>

        <div style="margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--glass-border)">
            <h4 style="margin-bottom: 16px">Change Password</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" class="form-control" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="••••••••">
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--glass-border)">
            <button class="btn btn-ghost" onclick="deleteAccount()" style="color: var(--danger)">Delete Account</button>
            <button class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
        </div>
    </div>
</div>
{{end}}
