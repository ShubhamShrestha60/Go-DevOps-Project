{{define "content"}}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px">
    <h2>Task Board</h2>
    <div style="display: flex; gap: 12px">
        <select id="filter-priority" class="form-control" style="width: 120px" onchange="fetchTasks()">
            <option value="">Priority...</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
        </select>
        <button class="btn btn-ghost" onclick="exportTasks()" style="margin-right: 8px">
            <i class="fas fa-file-export"></i> Export CSV
        </button>
        <button class="btn btn-primary" onclick="showModal('task-modal')">
            <i class="fas fa-plus"></i> Add Task
        </button>
    </div>
</div>

<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px">
    <!-- Kanban Columns -->
    <div class="kanban-col" id="col-todo">
        <h4 style="margin-bottom: 16px; color: var(--text-muted); display: flex; align-items: center; gap: 8px">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted)"></span>
            To Do
        </h4>
        <div class="task-container"></div>
    </div>

    <div class="kanban-col" id="col-in-progress">
        <h4 style="margin-bottom: 16px; color: var(--primary); display: flex; align-items: center; gap: 8px">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--primary)"></span>
            In Progress
        </h4>
        <div class="task-container"></div>
    </div>

    <div class="kanban-col" id="col-review">
        <h4 style="margin-bottom: 16px; color: var(--warning); display: flex; align-items: center; gap: 8px">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--warning)"></span>
            Review
        </h4>
        <div class="task-container"></div>
    </div>

    <div class="kanban-col" id="col-done">
        <h4 style="margin-bottom: 16px; color: var(--success); display: flex; align-items: center; gap: 8px">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--success)"></span>
            Done
        </h4>
        <div class="task-container"></div>
    </div>
</div>

<!-- Create Task Modal -->
<div id="task-modal" class="modal-overlay" style="display: none;">
    <div class="glass glass-card modal-content" style="max-width: 500px; width: 90%; margin: 100px auto; padding: 32px">
        <div class="form-group" style="margin-bottom: 16px">
            <label style="display: block; margin-bottom: 8px">Project</label>
            <select id="task-project-id" class="form-control">
                <option value="">Select Project...</option>
                <!-- Projects populated by JS -->
            </select>
        </div>
        <div class="form-group" style="margin-bottom: 16px">
            <label style="display: block; margin-bottom: 8px">Title</label>
            <input type="text" id="task-title" class="form-control" placeholder="Fix bug #123">
        </div>
        <div class="form-group" style="margin-bottom: 16px">
            <label style="display: block; margin-bottom: 8px">Description</label>
            <textarea id="task-desc" class="form-control" placeholder="Add some details..."></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px">
            <div class="form-group">
                <label style="display: block; margin-bottom: 8px">Status</label>
                <select id="task-status" class="form-control">
                    <option value="todo">To Do</option>
                    <option value="in-progress">In Progress</option>
                    <option value="review">Review</option>
                    <option value="done">Done</option>
                </select>
            </div>
            <div class="form-group">
                <label style="display: block; margin-bottom: 8px">Priority</label>
                <select id="task-priority" class="form-control">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="margin-bottom: 16px">
            <label style="display: block; margin-bottom: 8px">Assigned To</label>
            <select id="task-assigned-to" class="form-control">
                <option value="">Unassigned</option>
                <!-- Users populated by JS -->
            </select>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px">
            <button class="btn" style="background: rgba(255,255,255,0.05)" onclick="hideModal('task-modal')">Cancel</button>
            <button id="save-task-btn" class="btn btn-primary" onclick="saveTask()">Add Task</button>
        </div>
    </div>
</div>

<!-- Task Details & Comments Modal -->
<div id="task-details-modal" class="modal-overlay" style="display: none;">
    <div class="glass glass-card modal-content" style="max-width: 600px; width: 90%; margin: 60px auto; padding: 32px">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px">
            <div>
                <span id="detail-priority" class="status-pill" style="font-size: 10px; margin-bottom: 8px; display: inline-block"></span>
                <h2 id="detail-title" style="margin-bottom: 8px"></h2>
        <div style="font-size: 13px; color: var(--primary); margin-bottom: 24px; font-weight: 500">
            <i class="fas fa-folder-open" style="margin-right: 4px"></i> <span id="detail-project"></span>
        </div>
            </div>
            <button class="btn btn-ghost" onclick="hideModal('task-details-modal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <p id="detail-desc" style="color: var(--text-muted); margin-bottom: 32px; line-height: 1.6"></p>
        
        <div style="border-top: 1px solid var(--glass-border); padding-top: 24px">
            <h4 style="margin-bottom: 16px"><i class="fas fa-comments" style="margin-right: 8px"></i> Comments</h4>
            <div id="comments-container" style="max-height: 250px; overflow-y: auto; margin-bottom: 24px; padding-right: 8px">
                <!-- Comments populated by JS -->
            </div>
            
            <div style="display: flex; gap: 12px; align-items: center">
                <input type="text" id="comment-input" class="form-control" placeholder="Write a comment..." style="flex: 1">
                <button class="btn btn-primary" onclick="window.submitComment()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>
{{end}}
