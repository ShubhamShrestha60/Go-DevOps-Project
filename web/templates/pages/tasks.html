{{define "content"}}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px">
    <h2>Task Board</h2>
    <div style="display: flex; gap: 12px">
        <button class="btn btn-primary" onclick="showModal('task-modal')">
            <i class="fas fa-plus"></i> Add Task
        </button>
    </div>
</div>

<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px">
    <!-- Kanban Columns -->
    <div class="kanban-col" id="col-todo">
        <h4 style="margin-bottom: 16px; color: var(--text-muted); display: flex; align-items: center; gap: 8px">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted)"></span>
            To Do
        </h4>
        <div class="task-container"></div>
    </div>

    <div class="kanban-col" id="col-in-progress">
        <h4 style="margin-bottom: 16px; color: var(--primary); display: flex; align-items: center; gap: 8px">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--primary)"></span>
            In Progress
        </h4>
        <div class="task-container"></div>
    </div>

    <div class="kanban-col" id="col-review">
        <h4 style="margin-bottom: 16px; color: var(--warning); display: flex; align-items: center; gap: 8px">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--warning)"></span>
            Review
        </h4>
        <div class="task-container"></div>
    </div>

    <div class="kanban-col" id="col-done">
        <h4 style="margin-bottom: 16px; color: var(--success); display: flex; align-items: center; gap: 8px">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--success)"></span>
            Done
        </h4>
        <div class="task-container"></div>
    </div>
</div>

<!-- Create Task Modal -->
<div id="task-modal" class="modal-overlay" style="display: none;">
    <div class="glass glass-card modal-content" style="max-width: 500px; width: 90%; margin: 100px auto; padding: 32px">
        <div class="form-group" style="margin-bottom: 16px">
            <label style="display: block; margin-bottom: 8px">Project</label>
            <select id="task-project-id" class="form-control">
                <option value="">Select Project...</option>
                <!-- Projects populated by JS -->
            </select>
        </div>
        <div class="form-group" style="margin-bottom: 16px">
            <label style="display: block; margin-bottom: 8px">Title</label>
            <input type="text" id="task-title" class="form-control" placeholder="Fix bug #123">
        </div>
        <div class="form-group" style="margin-bottom: 16px">
            <label style="display: block; margin-bottom: 8px">Description</label>
            <textarea id="task-desc" class="form-control" placeholder="Add some details..."></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px">
            <div class="form-group">
                <label style="display: block; margin-bottom: 8px">Status</label>
                <select id="task-status" class="form-control">
                    <option value="todo">To Do</option>
                    <option value="in-progress">In Progress</option>
                    <option value="review">Review</option>
                    <option value="done">Done</option>
                </select>
            </div>
            <div class="form-group">
                <label style="display: block; margin-bottom: 8px">Priority</label>
                <select id="task-priority" class="form-control">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end">
            <button class="btn" style="background: rgba(255,255,255,0.05)" onclick="hideModal('task-modal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveTask()">Add Task</button>
        </div>
    </div>
</div>
{{end}}
