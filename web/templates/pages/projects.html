{{define "content"}}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px">
    <h2>Your Projects</h2>
    <button class="btn btn-primary" onclick="showModal('project-modal')">
        <i class="fas fa-plus"></i> New Project
    </button>
</div>

<div class="stats-grid" id="project-list">
    <!-- Projects will be loaded from API -->
    <div class="glass glass-card" style="padding: 20px; text-align: center">
        <p>Loading projects...</p>
    </div>
</div>

<!-- Create Project Modal -->
<div id="project-modal" class="modal-overlay" style="display: none;">
    <div class="glass glass-card modal-content" style="max-width: 500px; width: 90%; margin: 100px auto; padding: 32px">
        <h3 style="margin-bottom: 24px">Create New Project</h3>
        <div class="form-group" style="margin-bottom: 20px">
            <label style="display: block; margin-bottom: 8px">Project Name</label>
            <input type="text" id="project-name" class="form-control" placeholder="e.g. Apollo Sync">
        </div>
        <div class="form-group" style="margin-bottom: 24px">
            <label style="display: block; margin-bottom: 8px">Description</label>
            <textarea id="project-desc" class="form-control" style="min-height: 100px" placeholder="What is this project about?"></textarea>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end">
            <button class="btn" style="background: rgba(255,255,255,0.05)" onclick="hideModal('project-modal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveProject()">Create Project</button>
        </div>
    </div>
</div>
{{end}}
