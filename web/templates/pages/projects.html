{{define "content"}}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px">
    <h2>Your Projects</h2>
    <button class="btn btn-primary" onclick="showCreateProjectModal()">
        <i class="fas fa-plus"></i> New Project
    </button>
</div>

<div class="stats-grid" id="project-list">
    <!-- Projects will be loaded from API -->
    <div class="glass glass-card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 16px">
            <span style="background: rgba(79, 70, 229, 0.2); color: #818cf8; padding: 4px 8px; border-radius: 6px; font-size: 12px">Active</span>
            <i class="fas fa-ellipsis-v" style="color: var(--text-muted); cursor: pointer"></i>
        </div>
        <h3 style="margin-bottom: 8px">Project Apollo</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px">Next-generation synchronization engine for global teams.</p>
        
        <div style="display: flex; justify-content: space-between; align-items: center">
            <div style="display: flex; -webkit-mask-image: linear-gradient(to right, black 80%, transparent)">
                <!-- Team avatars -->
                <div style="width: 28px; height: 28px; border-radius: 50%; background: #4f46e5; border: 2px solid var(--bg-dark)"></div>
                <div style="width: 28px; height: 28px; border-radius: 50%; background: #10b981; border: 2px solid var(--bg-dark); margin-left: -8px"></div>
                <div style="width: 28px; height: 28px; border-radius: 50%; background: #f59e0b; border: 2px solid var(--bg-dark); margin-left: -8px"></div>
            </div>
            <span style="font-size: 12px; color: var(--text-muted)">12 Tasks</span>
        </div>
    </div>
    <!-- More project cards placeholder -->
</div>
{{end}}
