<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DevPulse</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            width: 400px;
            padding: 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--primary);
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card glass glass-card">
        <div class="login-header">
            <i class="fas fa-pulse"></i>
            <h2>Welcome to DevPulse</h2>
            <p class="form-label" style="text-align: center">Production-grade productivity</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px">Sign In</button>
        </form>

        <div style="margin-top: 24px; text-align: center; font-size: 14px; color: var(--text-muted)">
            Don't have an account? <a href="#" id="toggle-register" style="color: var(--primary); text-decoration: none">Register</a>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    alert('Invalid credentials');
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
