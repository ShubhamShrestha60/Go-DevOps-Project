apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  node.rules.yaml: |
    groups:
      - name: node.rules
        rules:
          - alert: NodeHighCPU
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 5m
            labels:
              severity: critical
          - alert: NodeHighMemory
            expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
            for: 5m
            labels:
              severity: critical
          - alert: NodeDiskPressure
            expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} * 100 > 80
            for: 5m
            labels:
              severity: critical
  kubernetes.rules.yaml: |
    groups:
      - name: kubernetes.rules
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: warning
          - alert: PodNotReady
            expr: sum by (namespace, pod) (kube_pod_status_ready{condition="false"}) > 0
            for: 5m
            labels:
              severity: warning
          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
            for: 5m
            labels:
              severity: critical
  monitoring-stack.rules.yaml: |
    groups:
      - name: monitoring-stack.rules
        rules:
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
          - alert: PrometheusHighStorageUsage
            expr: prometheus_tsdb_storage_blocks_bytes / prometheus_tsdb_storage_limit_bytes > 0.8
            for: 5m
            labels:
              severity: critical
