apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  node.rules.yaml: |
    groups:
      - name: node.rules
        rules:
          - alert: NodeHighCPU
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} CPU above 85%"
              description: "CPU usage is {{ $value | printf \"%.1f\" }}%. Runbook: https://runbooks.internal/node-high-cpu"

          - alert: NodeHighMemory
            expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} memory above 85%"
              description: "Memory usage is {{ $value | printf \"%.1f\" }}%. Runbook: https://runbooks.internal/node-high-memory"

          - alert: NodeDiskPressure
            expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} * 100 > 80
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} disk above 80%"
              description: "Disk usage at {{ $value | printf \"%.1f\" }}% on /. Runbook: https://runbooks.internal/node-disk-pressure"

          - alert: NodeDiskFillingSoon
            # Predicts full within 24h using linear regression over last 6h
            expr: predict_linear(node_filesystem_free_bytes{mountpoint="/"}[6h], 24 * 3600) < 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} disk will fill within 24h"
              description: "At the current write rate, / will be full in less than 24 hours."

          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is NotReady"
              description: "Node has been NotReady for more than 2 minutes. Runbook: https://runbooks.internal/node-not-ready"

  kubernetes.rules.yaml: |
    groups:
      - name: kubernetes.rules
        rules:
          # Deduplicated: one alert, cleaner threshold
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
              description: "Container {{ $labels.container }} has restarted {{ $value | printf \"%.0f\" }} times in the last 15m."

          - alert: PodNotReady
            expr: sum by (namespace, pod) (kube_pod_status_ready{condition="false"}) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
              description: "Pod has been in a non-ready state for more than 5 minutes."

          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} OOMKilled"
              description: "Container {{ $labels.container }} was OOMKilled. Consider raising its memory limit."

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
              description: "Desired {{ $labels.spec_replicas }} replicas, only {{ $labels.status_replicas }} available."

          - alert: DeploymentOffline
            expr: kube_deployment_status_replicas_available == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has 0 available replicas"
              description: "All pods are down. Runbook: https://runbooks.internal/deployment-offline"

          - alert: PersistentVolumeClaimPending
            expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} stuck Pending"
              description: "PVC has been Pending for >5m — storage class may be misconfigured or no available PVs."

  storage.rules.yaml: |
    groups:
      - name: storage.rules
        rules:
          - alert: PVCDiskUsageHigh
            expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} above 80%"
              description: "Volume is {{ $value | printf \"%.1f\" }}% full."

          - alert: PVCDiskUsageCritical
            expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} above 90%"
              description: "Volume is {{ $value | printf \"%.1f\" }}% full. Expand or prune immediately."

  monitoring-stack.rules.yaml: |
    groups:
      - name: monitoring-stack.rules
        rules:
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Scrape target {{ $labels.job }}/{{ $labels.instance }} is down"
              description: "Prometheus cannot reach this target for >2m."

          - alert: PrometheusHighStorageUsage
            # Compares TSDB block bytes against the known 8GB PVC limit
            expr: prometheus_tsdb_storage_blocks_bytes / (8 * 1024 * 1024 * 1024) > 0.8
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Prometheus TSDB storage above 80% of 8GB"
              description: "Storage at {{ $value | printf \"%.1f\" }}%. Consider reducing retention or expanding PVC."

          - alert: PrometheusRuleEvaluationSlow
            expr: prometheus_rule_evaluation_duration_seconds{quantile="0.9"} > prometheus_rule_group_interval_seconds
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus rule evaluation is taking longer than the scrape interval"
              description: "Rule group {{ $labels.rule_group }} evaluation is slower than its interval."

          - alert: LokiIngestionRateHigh
            expr: sum(rate(loki_distributor_bytes_received_total[5m])) > 3 * 1024 * 1024
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Loki ingestion rate approaching limit"
              description: "Ingestion rate is near the 4MB/s limit configured in limits_config."