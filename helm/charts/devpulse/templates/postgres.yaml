{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devpulse.fullname" . }}-postgres
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "devpulse.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devpulse.fullname" . }}-postgres
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "devpulse.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "devpulse.name" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "devpulse.name" . }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "devpulse.fullname" . }}-secrets
              key: DB_PASSWORD
        - name: POSTGRES_DB
          value: {{ .Values.postgres.dbName }}
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.postgres.storage }}
{{- end }}
