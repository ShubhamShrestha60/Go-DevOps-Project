apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devpulse.fullname" . }}-config
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.postgres.host | default (printf "%s-postgres" (include "devpulse.fullname" .)) | quote }}
  DB_PORT: "5432"
  DB_NAME: {{ .Values.postgres.dbName | quote }}
  DB_USER: {{ .Values.postgres.dbUser | quote }}
  DB_SSLMODE: "disable"
  ENV: {{ .Values.config.env | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  JWT_EXPIRY_HOURS: {{ .Values.config.jwtExpiryHours | quote }}
